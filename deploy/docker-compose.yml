version: '3.8'
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: EventOrganizer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  api:
    build:
      context: ../backend/api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=EventOrganizer;Username=postgres;Password=postgres123"
      
    ports:
      - "5053:80"
    depends_on:
      - db

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/institutionaleventorganizer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
