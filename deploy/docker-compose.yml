version: '3.8'
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: EventOrganizer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/database/initdb.sql:/docker-entrypoint-initdb.d/00_initdb.sql:ro
      - ../backend/database/create_users.sql:/docker-entrypoint-initdb.d/01_create_users.sql:ro
      - ../backend/database/create_events.sql:/docker-entrypoint-initdb.d/02_create_events.sql:ro
      - ../backend/database/migrate_user_columns.sql:/docker-entrypoint-initdb.d/03_migrate_user_columns.sql:ro
      - ../backend/database/migrate_event_images.sql:/docker-entrypoint-initdb.d/04_migrate_event_images.sql:ro
      - ../backend/database/migrate_inscription_columns.sql:/docker-entrypoint-initdb.d/05_migrate_inscription_columns.sql:ro
      - ../backend/database/create_inscriptions.sql:/docker-entrypoint-initdb.d/06_create_inscriptions.sql:ro
      - ../backend/database/create_attendance.sql:/docker-entrypoint-initdb.d/07_create_attendance.sql:ro
      - ../backend/database/migrate_announcement_columns.sql:/docker-entrypoint-initdb.d/08_migrate_announcement_columns.sql:ro
      - ../backend/database/create_announcements.sql:/docker-entrypoint-initdb.d/09_create_announcements.sql:ro
      - ../backend/database/migrate_reminder_sent.sql:/docker-entrypoint-initdb.d/10_migrate_reminder_sent.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EventOrganizer"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: ../backend/api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=EventOrganizer;Username=postgres;Password=postgres123"
      GmailSettings__ClientId: ${GMAIL_CLIENT_ID}
      GmailSettings__ClientSecret: ${GMAIL_CLIENT_SECRET}
      GmailSettings__TokenPath: /app/GoogleTokens
    volumes:
      - gmail_tokens:/app/GoogleTokens
    ports:
      - "5053:80"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/institutionaleventorganizer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  gmail_tokens:
