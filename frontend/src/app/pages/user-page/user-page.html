<div class="page-wrapper">
  <app-navbar />

  <!-- ANUNCIOS -->
  <section class="hero">
    <div class="hero-content">
      <a class="section-title" routerLink="/announcements">ANUNCIOS</a>
      <div class="announcements-grid">
        @for (anuncio of anuncios(); track anuncio.id) {
          <div class="announcement-card">
            <h3 class="ann-title">{{ anuncio.titulo }}</h3>
            <div class="ann-footer">
              <span class="ann-fecha">Fecha de publicación: {{ anuncio.fecha }}</span>
              <a class="btn-ver-mas" [routerLink]="['/announcements', anuncio.id]">Ver más</a>
            </div>
          </div>
        }
      </div>
    </div>
  </section>

  <!-- EVENTOS -->
  <section class="events-section">
    <a class="section-title-dark" routerLink="/events">EVENTOS</a>
    <div class="events-grid">
      @for (evento of eventos(); track evento.id) {
        <div class="event-card">
          <img [src]="evento.imagen" [alt]="evento.titulo" class="event-img" />
          <div class="event-overlay">
            <span class="event-titulo">{{ evento.titulo }}</span>
            <a class="btn-ver-mas-event" [routerLink]="['/events', evento.id]">Ver más</a>
          </div>
        </div>
      }
    </div>
  </section>

  <app-footer />
</div>
