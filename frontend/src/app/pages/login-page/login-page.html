<div class="main-container">

  <div class="login-card">

    @if(isRegistering) {
      <app-login-logo></app-login-logo>

      <div class="register-section">
        <h2><strong>Registro de Cuenta</strong></h2>

        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
          <div class="form-group">
            <label class="field-label">
              Nombre
              <span class="required" [class.visible]="registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched">*</span>
            </label>
            <input formControlName="nombre" type="text" placeholder="Ingrese su nombre">
          </div>

          <div class="form-group">
            <label class="field-label">
              Apellidos
              <span class="required" [class.visible]="registerForm.get('apellidos')?.invalid && registerForm.get('apellidos')?.touched">*</span>
            </label>
            <input formControlName="apellidos" type="text" placeholder="Ingrese sus apellidos">
          </div>

          <div class="form-group">
            <label class="field-label">
              Carne
              <span class="required" [class.visible]="registerForm.get('carne')?.invalid && registerForm.get('carne')?.touched">*</span>
            </label>
            <input formControlName="carne" type="text" placeholder="Ingrese su carne">
          </div>

          <div class="form-group">
            <label class="field-label">
              Correo
              <span class="required" [class.visible]="registerForm.get('correo')?.invalid && registerForm.get('correo')?.touched">*</span>
            </label>
            <input formControlName="correo" type="email" placeholder="Ingrese su correo">
          </div>

          <div class="form-group">
            <label class="field-label">
              Contraseña
              <span class="required" [class.visible]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">*</span>
            </label>
            <input formControlName="password" type="password" placeholder="Ingrese su contraseña">
          </div>

          <div class="button-row">
            <button type="submit" class="btn primary">Registrar Cuenta</button>
            <button type="button" class="btn primary" (click)="onCancel()">Cancelar</button>
          </div>
        </form>
      </div>
    } @else {
      <!-- IZQUIERDA -->
      <div class="left-section">
        <h2><strong>Inicio de Sesión</strong></h2>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div class="form-group">
            <label class="field-label">
              Correo
              <span class="required" [class.visible]="loginForm.get('correo')?.invalid && loginForm.get('correo')?.touched">*</span>
            </label>
            <input formControlName="correo" type="email" placeholder="Ingrese su correo">
          </div>

          <div class="form-group">
            <label class="field-label">
              Contraseña
              <span class="required" [class.visible]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">*</span>
            </label>
            <input formControlName="password" type="password" placeholder="Ingrese su contraseña">
          </div>

          <div class="button-group">
            <button type="button" class="btn primary" (click)="toggleRegister()">Registrar Cuenta</button>
            <button type="submit" class="btn primary">Iniciar Sesión</button>
            <a class="help-link">¿Tiene problemas para acceder?</a>
          </div>

          <div class="error-container">
            @if (loginError) {
              <p class="error-message">{{ loginError }}</p>
            }
          </div>
        </form>
      </div>

      <!-- DERECHA -->
      <app-login-logo></app-login-logo>
    }

  </div>

</div>
