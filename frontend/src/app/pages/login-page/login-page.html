<div class="main-container">

  <div class="login-card">

    @if(isRegistering) {
      <app-login-logo></app-login-logo>

      <div class="register-section">
        <h2><strong>Registro de Cuenta</strong></h2>

        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
          <div class="form-group">
            <label>
              Nombre
              @if(registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched) {
                <span class="required">*</span>
              }
            </label>
            <input formControlName="nombre" type="text" placeholder="Ingrese su nombre">
          </div>

          <div class="form-group">
            <label>
              Apellidos
              @if(registerForm.get('apellidos')?.invalid && registerForm.get('apellidos')?.touched) {
                <span class="required">*</span>
              }
            </label>
            <input formControlName="apellidos" type="text" placeholder="Ingrese sus apellidos">
          </div>

          <div class="form-group">
            <label>
              Carne
              @if(registerForm.get('carne')?.invalid && registerForm.get('carne')?.touched) {
                <span class="required">*</span>
              }
            </label>
            <input formControlName="carne" type="text" placeholder="Ingrese su carne">
          </div>

          <div class="form-group">
            <label>
              Correo
              @if(registerForm.get('correo')?.invalid && registerForm.get('correo')?.touched) {
                <span class="required">*</span>
              }
            </label>
            <input formControlName="correo" type="email" placeholder="Ingrese su correo">
          </div>

          <div class="form-group">
            <label>
              Contraseña
              @if(registerForm.get('password')?.invalid && registerForm.get('password')?.touched) {
                <span class="required">*</span>
              }
            </label>
            <input formControlName="password" type="password" placeholder="Ingrese su contraseña">
          </div>

          <div class="button-row">
            <button type="submit" class="btn primary">Registrar Cuenta</button>
            <button type="button" class="btn primary" (click)="onCancel()">Cancelar</button>
          </div>
        </form>
      </div>
    } @else {
      <!-- IZQUIERDA -->
      <div class="left-section">
        <h2><strong>Inicio de Sesión</strong></h2>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div class="form-group">
            <label>
              Correo
              @if(loginForm.get('correo')?.invalid && loginForm.get('correo')?.touched) {
                <span class="required">*</span>
              }
            </label>
            <input formControlName="correo" type="email" placeholder="Ingrese su correo">
          </div>

          <div class="form-group">
            <label>
              Contraseña
              @if(loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
                <span class="required">*</span>
              }
            </label>
            <input formControlName="password" type="password" placeholder="Ingrese su contraseña">
          </div>

          <div class="button-group">
            <button type="button" class="btn primary" (click)="toggleRegister()">Registrar Cuenta</button>
            <button type="submit" class="btn primary">Iniciar Sesión</button>
            <a class="help-link">¿Tiene problemas para acceder?</a>
          </div>
        </form>
      </div>

      <!-- DERECHA -->
      <app-login-logo></app-login-logo>
    }

  </div>

</div>
