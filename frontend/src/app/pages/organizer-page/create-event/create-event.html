<div class="main-container d-flex">

  <!-- SIDEBAR -->
<div class="sidebar p-4 text-white">

  <div class="logo-container">
    <img src="assets/logo.png" alt="Logo" class="logo">
  </div>

  <h5 class="mb-4">Sistema de Gestión de eventos</h5>

  <ul class="nav flex-column">
    <li class="nav-item mb-2">
      <a class="nav-link text-white" href="#">Crear Eventos</a>
    </li>
    <li class="nav-item">
      <a class="nav-link text-white" href="#">Mis Eventos</a>
    </li>
  </ul>

</div>

  <!-- CONTENIDO -->
  <div class="content d-flex justify-content-center align-items-center">

    <div class="form-card card shadow p-4">
      
      <h4 class="mb-1">Crear Nuevo Evento</h4>
      <p class="text-muted mb-4">Complete la información detallada para que el administrador pueda revisarlo</p>

      <form (ngSubmit)="saveEvent()">

        <div class="mb-3">
          <label class="form-label">Título del Evento</label>
         <input type="text" class="form-control" [(ngModel)]="title" name="title">
        </div>

        <div class="mb-3">
          <label class="form-label">Descripción Detallada</label>
         <textarea class="form-control" [(ngModel)]="description" name="description"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Imagen del Evento</label>
            <input type="file" class="form-control" (change)="onFileSelected($event)">
        </div>
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Categoría</label>
            <select class="form-select" [(ngModel)]="category" name="category">
            <option disabled selected>Seleccione una categoría</option>
            <option value="academico">Académico</option>
            <option value="cultural">Cultural</option>
            <option value="deportivo">Deportivo</option>
            <option value="tecnologico">Tecnológico</option>
            </select>
          </div>

          <div class="col">
            <label class="form-label">Unidad Organizadora</label>
            <input type="text" class="form-control" [(ngModel)]="organizer" name="organizer">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Fecha y Hora</label>
           <input type="datetime-local" class="form-control" [(ngModel)]="date" name="date">
          </div>

          <div class="col">
            <label class="form-label">Cupo Máximo</label>
           <input type="number" class="form-control" [(ngModel)]="capacity" name="capacity">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Lugar Físico / Link Virtual</label>
         <input type="text" class="form-control" [(ngModel)]="place" name="place">
        </div>

        <div class="mb-3">
          <label class="form-label">Modalidad</label><br>
         <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="mode" value="presencial" [(ngModel)]="mode">
        <label class="form-check-label">Presencial</label>
        </div>
        <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="mode" value="virtual" [(ngModel)]="mode">
        <label class="form-check-label">Virtual</label>
        </div>
        </div>

        <div class="text-end">
          <button class="btn btn-primary" (click)="saveEvent()">
            Guardar Evento</button>
        </div>
  
      </form>

    </div>

  </div>

</div>
