<div class="main-container d-flex">

  <app-sidebar class="sidebar-wrapper" [links]="sidebarLinks"></app-sidebar>

  <div class="content p-3 p-md-4 w-100" *ngIf="event">

    <!-- ═══ TARJETA 1: RESUMEN + ACCIONES ═══ -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body d-flex flex-column flex-sm-row align-items-start align-items-sm-stretch gap-3 p-3 p-md-4">

        <!-- Imagen -->
        <img
          [src]="event.imageFileEvent
            ? 'http://localhost:5053' + event.imageFileEvent
            : 'assets/default.jpg'"
          class="event-thumb rounded-3 flex-shrink-0"
          alt="Imagen del evento">

        <!-- Info + acciones: ocupa todo el espacio y se divide en dos filas -->
       <div class="d-flex flex-column flex-grow-1 justify-content-start gap-2">

          <!-- Fila superior: Badge + Título + Lugar -->
          <div>
            <span class="badge rounded-pill status-pending  mb-2" *ngIf="getEventStatus() === 'pending'">● Pendiente</span>
            <span class="badge rounded-pill status-approved mb-2" *ngIf="getEventStatus() === 'approved'">● Aprobado</span>
            <span class="badge rounded-pill status-finished mb-2" *ngIf="getEventStatus() === 'finished'">● Concluido</span>

            <h2 class="event-title mb-1">{{ event.title }}</h2>
    
          </div>

          <!-- Fila inferior: Botones alineados a la derecha -->
          <div class="d-flex flex-wrap gap-2 justify-content-end">

            <!-- APROBADO -->
            <ng-container *ngIf="getEventStatus() === 'approved'">
              <button class="btn btn-success     fw-semibold px-4">📋 Asistencia</button>
              <button class="btn btn-primary     fw-semibold px-4">✉️ Comunicado</button>
              <button class="btn btn-warning     fw-semibold px-4">✏️ Editar</button>
              <button class="btn btn-danger      fw-semibold px-4">🗑️ Eliminar</button>
            </ng-container>

            <!-- CONCLUIDO -->
            <ng-container *ngIf="getEventStatus() === 'finished'">
              <button class="btn btn-primary     fw-semibold px-4">📋 Asistencia</button>
            </ng-container>

            <!-- PENDIENTE -->
            <ng-container *ngIf="getEventStatus() === 'pending'">
              <button class="btn btn-warning     fw-semibold px-4">✏️ Editar</button>
              <button class="btn btn-danger      fw-semibold px-4">🗑️ Eliminar</button>
            </ng-container>

          </div>
        </div>

      </div>
    </div>

    <!-- ═══ TARJETA 2: DETALLE DEL EVENTO ═══ -->
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-3 p-md-4">

        <h3 class="fw-bold text-dark mb-1">Información del Evento</h3>
        <hr class="mb-4">

        <div class="row g-4">

          <div class="col-12 col-md-6">
            <p class="detail-label">Fecha</p>
            <p class="detail-value">{{ event.eventDate | date:'EEEE, d MMMM y – HH:mm' }}</p>
          </div>

          <div class="col-12 col-md-6">
            <p class="detail-label">Lugar</p>
            <p class="detail-value">{{ event.place }}</p>
          </div>

          <div class="col-12 col-md-6">
            <p class="detail-label">Cupos disponibles</p>
            <p class="detail-value">{{ event.avalaibleEntries }}</p>
          </div>

          <div class="col-12">
            <p class="detail-label">Descripción</p>
            <p class="detail-value description-text">{{ event.eventDescription }}</p>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
