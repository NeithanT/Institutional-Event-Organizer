<div class="main-container d-flex">
  
  <app-sidebar class="sidebar-wrapper" [links]="sidebarLinks"></app-sidebar>

  <div class="content d-flex justify-content-center align-items-center">

    <div class="form-card card shadow p-4">

      <h4 class="mb-1">Editar Evento</h4>
      <p class="text-muted mb-4">Modifique la información del evento</p>

      <form (ngSubmit)="updateEvent()">

        <div class="mb-3">
          <label class="form-label">Título del Evento</label>
          <input type="text" class="form-control" [(ngModel)]="title" name="title">
        </div>

        <div class="mb-3">
          <label class="form-label">Descripción Detallada</label>
          <textarea class="form-control" [(ngModel)]="description" name="description"></textarea>
        </div>


        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Fecha y Hora</label>
            <input type="datetime-local" class="form-control" [(ngModel)]="date" name="date">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Lugar</label>
          <input type="text" class="form-control" [(ngModel)]="place" name="place">
        </div>

        <div class="mb-3">
          <label class="form-label">Modalidad</label><br>
          <div class="form-check">
            <input type="checkbox" class="form-check-input"
              [(ngModel)]="isVirtual" name="isVirtual" id="isVirtual">
            <label class="form-check-label" for="isVirtual">
              Evento virtual
            </label>
          </div>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-success">
            Actualizar Evento
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
