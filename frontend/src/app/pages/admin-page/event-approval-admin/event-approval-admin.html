<section class="admin-section">
	<header class="mb-4">
		<h2 class="fw-bold mb-1">Aprobacion de eventos</h2>
		<p class="text-muted mb-0">Vista de eventos pendientes de aprobacion.</p>
	</header>

	<div class="table-responsive card shadow-sm border-0">
		<table class="table align-middle mb-0">
			<thead>
				<tr>
					<th>Evento</th>
					<th>Organizador</th>
					<th>Fecha</th>
					<th>Lugar</th>
					<th class="text-end">Accion</th>
				</tr>
			</thead>
			<tbody *ngIf="events.length > 0">
				<tr *ngFor="let event of events">
					<td class="fw-semibold">{{ event.title }}</td>
					<td>{{ event.organizer }}</td>
					<td>{{ event.date | date:'yyyy-MM-dd' }}</td>
					<td>{{ event.location }}</td>
					<td class="text-end">
						<button
							class="btn btn-success btn-sm"
							(click)="approveEvent(event.id)"
						>
							Aprobar
						</button>
					</td>
				</tr>
			</tbody>
			<tbody *ngIf="events.length === 0">
				<tr>
					<td colspan="5" class="text-center text-muted py-4">
						No hay eventos pendientes de aprobación.
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
