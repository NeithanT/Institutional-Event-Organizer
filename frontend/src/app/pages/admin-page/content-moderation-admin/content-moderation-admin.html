<section class="admin-section">
	<header class="mb-4">
		<h2 class="fw-bold mb-1">Moderacion de contenido</h2>
		<p class="text-muted mb-0">Eventos publicados con opcion de eliminacion.</p>
	</header>

	<div class="table-responsive card border-0 shadow-sm">
		<table class="table align-middle mb-0">
			<thead>
				<tr>
					<th>Evento</th>
					<th>Organizador</th>
					<th>Categoria</th>
					<th>Reportes</th>
					<th class="text-end">Accion</th>
				</tr>
			</thead>
			<tbody>
				<tr *ngFor="let event of events">
					<td class="fw-semibold">{{ event.title }}</td>
					<td>{{ event.organizer }}</td>
					<td>{{ event.category }}</td>
					<td>
						<span class="badge" [class.bg-warning]="event.reports > 0" [class.bg-success]="event.reports === 0">
							{{ event.reports }}
						</span>
					</td>
					<td class="text-end">
						<button class="btn btn-outline-danger btn-sm" (click)="removeEvent(event.id)">
							Eliminar
						</button>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
