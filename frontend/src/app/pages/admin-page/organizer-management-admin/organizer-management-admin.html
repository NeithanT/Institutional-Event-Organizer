<section class="admin-section">
	<header class="mb-4">
		<h2 class="fw-bold mb-1">Gestion de organizadores</h2>
		<p class="text-muted mb-0">Vista de organizadores registrados en el sistema.</p>
	</header>

	<div class="table-responsive card border-0 shadow-sm">
		<table class="table align-middle mb-0">
			<thead>
				<tr>
					<th>Nombre</th>
					<th>Departamento</th>
					<th>Email</th>
					<th>Estado</th>
				</tr>
			</thead>
			<tbody>
				<tr *ngFor="let organizer of organizers">
					<td class="fw-semibold">{{ organizer.name }}</td>
					<td>{{ organizer.department }}</td>
					<td>{{ organizer.email }}</td>
					<td>
						<span class="badge" [class.bg-success]="organizer.status === 'Activo'" [class.bg-secondary]="organizer.status === 'Pendiente'">
							{{ organizer.status }}
						</span>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
