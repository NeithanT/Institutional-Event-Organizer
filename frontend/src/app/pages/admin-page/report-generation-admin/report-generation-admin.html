<section class="admin-section">
	<header class="mb-4">
		<h2 class="fw-bold mb-1">Generación de reportes</h2>
		<p class="text-muted mb-0">Seleccione el rango de fechas y genere el reporte de asistencia por categoría.</p>
	</header>

	<div class="card border-0 shadow-sm p-3 p-md-4 report-card">
		<form class="report-form" (submit)="generateReport(); $event.preventDefault()">
			<div class="form-row">
				<div class="form-group">
					<label for="dateStart">Fecha inicio</label>
					<input id="dateStart" class="form-control" type="date" [(ngModel)]="dateStart" name="dateStart" required />
				</div>

				<div class="form-group">
					<label for="dateEnd">Fecha fin</label>
					<input id="dateEnd" class="form-control" type="date" [(ngModel)]="dateEnd" name="dateEnd" required />
				</div>
			</div>

			<div class="form-actions">
				<button type="submit" class="btn btn-primary" [disabled]="isLoading || !dateRangeValid">
					{{ isLoading ? 'Generando...' : 'Generar reporte' }}
				</button>
			</div>

			<div *ngIf="errorMessage" class="alert alert-danger mt-3" role="alert">
				{{ errorMessage }}
			</div>
		</form>
	</div>
</section>
