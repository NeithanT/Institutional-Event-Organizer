<section class="admin-section">
	<header class="mb-4">
		<h2 class="fw-bold mb-1">Sistema de anuncios</h2>
		<p class="text-muted mb-0">Formulario para publicar un anuncio a la comunidad.</p>
	</header>

	<div class="card border-0 shadow-sm p-3 p-md-4">
		<form>
			<div class="row g-3">
				<div class="col-md-8">
					<label class="form-label">Titulo</label>
					<input class="form-control" type="text" name="title" [(ngModel)]="form.title" required>
				</div>
				<div class="col-md-4">
					<label class="form-label">About</label>
					<input class="form-control" type="text" name="about" [(ngModel)]="form.about" required>
				</div>
				<div class="col-12">
					<label class="form-label">Contenido</label>
					<textarea class="form-control" rows="5" name="content" [(ngModel)]="form.content" required></textarea>
				</div>
			</div>

			<div class="d-flex justify-content-end mt-4">
				<button class="btn btn-primary" type="button" (click)="submitAnnouncement()">Enviar anuncio</button>
			</div>
		</form>
	</div>
</section>

@if (showModal) {
	<div class="modal-backdrop" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1040;display:flex;align-items:center;justify-content:center;">
		<div class="modal-box card p-4 shadow" style="width:360px;text-align:center;border-radius:12px;">
			<div style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.6rem;"
				[style.background]="modalSuccess ? '#d1fae5' : '#fee2e2'"
				[style.color]="modalSuccess ? '#065f46' : '#991b1b'">
				{{ modalSuccess ? '✓' : '!' }}
			</div>
			<h5 class="fw-bold mb-2">{{ modalTitle }}</h5>
			<p class="text-muted mb-4">{{ modalMessage }}</p>
			<button class="btn w-100"
				[class.btn-success]="modalSuccess"
				[class.btn-danger]="!modalSuccess"
				(click)="closeModal()">Continuar</button>
		</div>
	</div>
}
