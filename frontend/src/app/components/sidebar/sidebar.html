<div class="sidebar text-white">

  <div class="top-section p-4">

    <div class="logo-container text-center">
      <img [src]="logoSrc" class="img-fluid logo-img" alt="logo">
    </div>

    <h5 class="mb-4 text-center">{{ title }}</h5>

    <ul class="nav flex-column">
      <li class="nav-item mb-2" *ngFor="let link of links">
        <a class="nav-link text-white" [routerLink]="link.route" routerLinkActive="active">
          {{ link.label }}
        </a>
      </li>
    </ul>
  </div>


  <div class="bottom-bar">
    <a routerLink="/user" class="text-white">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
      <!-- Perfil -->
    <a class="icon text-white" routerLink="/profile">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>

    <!-- Logout -->
    <a class="icon text-white" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </a>
  </div>

</div>
