<div class="sidebar p-4 text-white">
  <div class="return">
    <a routerLink="/user" class="text-white">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Volver
    </a>
  </div>

  <div class="logo-container text-center">
    <img [src]="logoSrc" class="img-fluid logo-img" alt="logo">
  </div>

  <h5 class="mb-4 text-center">{{ title }}</h5>

  <ul class="nav flex-column">
    <li class="nav-item mb-2" *ngFor="let link of links">
      <a class="nav-link text-white" [routerLink]="link.route" routerLinkActive="active">
        {{ link.label }}
      </a>
    </li>
  </ul>
</div>
