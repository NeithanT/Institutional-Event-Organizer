<nav class="navbar">
  <div class="navbar-left">
    <img src="logos/logoxd2.png" alt="Logo TEC" class="navbar-logo" style="height: 60px; width: auto;" />
    <span class="navbar-title">Sistema de Gestión<br />de eventos</span>
  </div>
  <div class="navbar-links">
    @for (link of navbarLinks; track link) {
      <a routerLink="{{ link.route }}" routerLinkActive="active">{{ link.label }}</a>
    }
  </div>
  <div class="navbar-icons">
    <!-- Notificaciones -->
<!-- Notificaciones -->
<div class="notif-wrapper">
  <button class="icon notif-btn" (click)="toggleNotifications()">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    @if (notifications().length > 0) {
      <span class="notif-badge">{{ notifications().length }}</span>
    }
  </button>

  @if (showNotifications()) {
    <div class="notif-dropdown">
      <div class="notif-header">Notificaciones</div>
      @for (n of notifications(); track n.id) {
        <div class="notif-item">
          <a class="notif-link" [routerLink]="['/announcements', n.id]" (click)="dismiss(n.id); showNotifications.set(false)">
            <span class="notif-title">{{ n.title }}</span>
            <span class="notif-date">{{ n.date }}</span>
          </a>
          <button class="notif-delete" (click)="dismiss(n.id); $event.stopPropagation()" title="Descartar">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      }
      @if (notifications().length === 0) {
        <div class="notif-empty">Sin notificaciones</div>
      }
    </div>
  }
</div>
    <!-- Perfil -->
    <a class="icon" routerLink="/profile">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
    <!-- Logout -->
    <a class="icon" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </a>
  </div>
</nav>
