services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver2022
    ports:
      - "1433:1433"

    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong1Pass

    volumes:
      - ./init-db.sql:/usr/src/app/initdb.sql:ro
      - ./setup.sh:/usr/src/app/setup.sh

    entrypoint: /bin/bash /usr/src/app/setup.sh