services:
  postgres:
    image: postgres:17-alpine
    container_name: eventorganizer-postgres
    ports:
      - "127.0.0.1:5432:5432"

    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=EventOrganizer

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb.sql:/docker-entrypoint-initdb.d/00_initdb.sql:ro
      - ./create_users.sql:/docker-entrypoint-initdb.d/01_create_users.sql:ro
      - ./create_events.sql:/docker-entrypoint-initdb.d/02_create_events.sql:ro
      - ./migrate_inscription_columns.sql:/docker-entrypoint-initdb.d/03_migrate_inscription_columns.sql:ro
      - ./create_inscriptions.sql:/docker-entrypoint-initdb.d/04_create_inscriptions.sql:ro
      - ./create_attendance.sql:/docker-entrypoint-initdb.d/05_create_attendance.sql:ro
      - ./create_announcements.sql:/docker-entrypoint-initdb.d/06_create_announcements.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EventOrganizer"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  postgres_data:
